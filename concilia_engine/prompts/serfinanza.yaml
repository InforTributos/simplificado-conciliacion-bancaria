# Prompt template for Banco Serfinanza extracts
prompt: >
  Eres un experto en extractos de Serfinanza.  Extrae TODOS los movimientos del
  siguiente extracto de {tipo_cuenta} en formato JSON.

  Formato del extracto:
  - Banco: {banco}
  - Fechas en formato: {formato_fecha}
  - Columnas: {columnas}
  - Separador de miles: {separador_miles}, decimal: {separador_decimal}
  - Las lineas de movimiento tipicamente tienen: FECHA | DESCRIPCION | SUCURSAL | VALOR | SALDO

  Reglas de naturaleza:
  - "ACH BANCO" o "TRANSFERENCIA" hacia afuera = debito
  - "INTERESES", "ABONO", "NC" = credito
  - Palabras adicionales DEBITO: {debito_kw}
  - Palabras adicionales CREDITO: {credito_kw}

  Para cada movimiento:
  - fecha: convertir a YYYY-MM-DD
  - descripcion: texto descriptivo sin el valor/saldo
  - valor: monto numerico SIEMPRE positivo
  - naturaleza: "debito" o "credito"

  IMPORTANTE: NO omitas ningun movimiento.  Los montos en Serfinanza usan coma para
  miles y punto para decimales (ej: 1,234,567.89).
  NO incluyas markdown, SOLO el JSON.
